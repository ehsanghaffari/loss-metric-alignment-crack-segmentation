<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
<title id="title">Controlled demonstration workflow</title>
<desc id="desc">Datasets feed six frozen-loss training runs, saved probability maps, and offline rescoring under multiple evaluation conventions.</desc>
<style>
text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172133}.h{font-size:22px;font-weight:700}.s{font-size:16px}.box{fill:#fff;stroke:#183b66;stroke-width:2}.core{fill:#183b66}.coretext{fill:#fff}.arrow{stroke:#5b6778;stroke-width:2.5;fill:none;marker-end:url(#a)}
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#5b6778"/></marker></defs>
<rect x="30" y="55" width="190" height="220" rx="12" class="box"/><text x="125" y="92" text-anchor="middle" class="h">Datasets</text><text x="55" y="135" class="s">Crack500</text><text x="55" y="163" class="s">1,896 / 348 / 1,124</text><text x="55" y="211" class="s">DeepCrack</text><text x="55" y="239" class="s">240 / 60 / 237</text>
<path d="M220 165 H290" class="arrow"/>
<rect x="290" y="55" width="240" height="220" rx="12" class="box"/><text x="410" y="92" text-anchor="middle" class="h">Frozen training</text><text x="318" y="132" class="s">U-Net + ResNet-34</text><text x="318" y="163" class="s">Six loss functions</text><text x="318" y="194" class="s">24 total runs</text><text x="318" y="225" class="s">Native-resolution inference</text><text x="318" y="256" class="s">Float32 probability maps</text>
<path d="M530 165 H600" class="arrow"/>
<rect x="600" y="55" width="250" height="220" rx="12" class="core"/><text x="725" y="92" text-anchor="middle" class="h coretext">Offline rescoring</text><text x="628" y="132" class="s coretext">Threshold conventions</text><text x="628" y="163" class="s coretext">Tolerance radii</text><text x="628" y="194" class="s coretext">Boundary + topology</text><text x="628" y="225" class="s coretext">Aggregation</text><text x="628" y="256" class="s coretext">Quantification</text>
<path d="M850 165 H920" class="arrow"/>
<rect x="920" y="55" width="250" height="220" rx="12" class="box"/><text x="1045" y="92" text-anchor="middle" class="h">Alignment evidence</text><text x="948" y="132" class="s">Metric-family flips</text><text x="948" y="163" class="s">Threshold sensitivity</text><text x="948" y="194" class="s">Tolerance sensitivity</text><text x="948" y="225" class="s">Seed-noise comparison</text><text x="948" y="256" class="s">Reporting protocol</text>
</svg>